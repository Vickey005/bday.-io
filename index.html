<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello! 🎂</title>
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #fff0f3;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .login-box {
            background: white;
            padding: 40px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 77, 109, 0.2);
            text-align: center;
            width: 90%;
            max-width: 350px;
        }
        h2 { color: #ff4d6d; margin-bottom: 10px; }
        input {
            width: 80%;
            padding: 15px;
            margin-top: 20px;
            border: 2px solid #ffccd5;
            border-radius: 10px;
            outline: none;
            text-align: center;
            font-size: 1rem;
        }
        input:focus { border-color: #ff4d6d; }
        button {
            background: #ff4d6d;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            margin-top: 20px;
            font-weight: bold;
            cursor: pointer;
            width: 80%;
        }
        #errorMsg { color: red; font-size: 0.9rem; margin-top: 15px; display: none; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Hey Papu! ❤️</h2>
        <p>Enter password to see your surprise:</p>
        <input type="password" id="passInput" placeholder="Password...">
        <br>
        <button onclick="checkAndRedirect()">Open Surprise ✨</button>
        <p id="errorMsg">Thappaana password, thirumba try pannu!</p>
    </div>

    <script>
        function checkAndRedirect() {
            const pass = document.getElementById('passInput').value;
            const correctPass = "devi2305"; // Inga unga password set pannunga

            if(pass === correctPass) {
                // Password correct aana 'surprise.html' page-ku pogum
                window.location.href = "surprise.html"; 
            } else {
                document.getElementById('errorMsg').style.display = "block";
                document.getElementById('passInput').value = "";
            }
        }

        // Enter key press panna kooda login aagum
        document.getElementById("passInput").addEventListener("keyup", function(event) {
            if (event.key === "Enter") {
                checkAndRedirect();
            }
        });
    </script>

</body>
</html>
